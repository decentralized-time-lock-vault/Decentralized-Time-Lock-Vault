name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  STELLAR_CLI_VERSION: "26.0.0"

jobs:
  # ----------------------------------------------------------------
  #  Lint
  # ----------------------------------------------------------------
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --features testutils -- -D warnings

      - name: Build docs
        run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps

  # ----------------------------------------------------------------
  #  Test
  # ----------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test --features testutils

      - name: Run doc tests
        run: cargo test --doc --features testutils

  # ----------------------------------------------------------------
  #  Unsafe Code Scanner (cargo-geiger)
  # ----------------------------------------------------------------
  geiger:
    name: Unsafe Code Scanner (cargo-geiger)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-geiger
        run: cargo install cargo-geiger

      - name: Scan for unsafe code
        run: cargo geiger --all-features

  # ----------------------------------------------------------------
  #  License & dependency policy
  # ----------------------------------------------------------------
  deny:
    name: License & Bans (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ----------------------------------------------------------------
  #  Build WASM
  # ----------------------------------------------------------------
  build:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: [lint, test, deny]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Build release WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Cache stellar-cli
        id: cache-stellar
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /usr/local/bin/stellar
          key: stellar-cli-${{ env.STELLAR_CLI_VERSION }}

      - name: Install stellar-cli
        if: steps.cache-stellar.outputs.cache-hit != 'true'
        run: |
          curl -sSL "https://github.com/stellar/stellar-cli/releases/download/v${{ env.STELLAR_CLI_VERSION }}/stellar-cli-v${{ env.STELLAR_CLI_VERSION }}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C /usr/local/bin stellar

      - name: Optimize WASM
        run: |
          stellar contract optimize \
            --wasm target/wasm32-unknown-unknown/release/time_lock_vault.wasm \
            --wasm-out target/time_lock_vault.optimized.wasm

      - name: Check WASM size
        env:
          MAX_WASM_BYTES: 65536
        run: |
          echo "=== Raw WASM ==="
          ls -lh target/wasm32-unknown-unknown/release/time_lock_vault.wasm
          echo "=== Optimized WASM ==="
          ls -lh target/time_lock_vault.optimized.wasm
          ACTUAL=$(wc -c < target/time_lock_vault.optimized.wasm)
          echo "Optimized WASM size: ${ACTUAL} bytes (limit: ${MAX_WASM_BYTES})"
          if [ "$ACTUAL" -gt "$MAX_WASM_BYTES" ]; then
            echo "ERROR: WASM too large: ${ACTUAL} bytes exceeds limit of ${MAX_WASM_BYTES} bytes"
            exit 1
          fi

      - name: Upload optimized WASM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: time-lock-vault-wasm
          path: target/time_lock_vault.optimized.wasm
          retention-days: 30
