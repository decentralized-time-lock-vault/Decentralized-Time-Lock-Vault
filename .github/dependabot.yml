version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies

  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - rust
    groups:
      soroban:
        patterns:
          - "soroban-sdk"
          - "soroban-sdk-macros"

# Note: Dependabot does not support arbitrary binary downloads.
# The stellar-cli version (STELLAR_CLI_VERSION in .github/workflows/ci.yml)
# must be updated manually when a new release is published at:
# https://github.com/stellar/stellar-cli/releases
