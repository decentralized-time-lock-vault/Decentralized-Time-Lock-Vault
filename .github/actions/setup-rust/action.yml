name: Setup Rust
description: Install Rust stable with wasm32 target and restore cargo cache

inputs:
  components:
    description: Extra toolchain components (comma-separated)
    required: false
    default: ""
  cache-key-suffix:
    description: Optional suffix appended to the cache key
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
        components: ${{ inputs.components }}

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo${{ inputs.cache-key-suffix }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo${{ inputs.cache-key-suffix }}-
